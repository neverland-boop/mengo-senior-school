<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mengo secondary School Carousel</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Mengo Senior Secondary School Gallery</h1>

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="images/awareness.jpg" class="d-block w-100" alt="Image 1">
    </div>

    <div class="carousel-item">
      <img src="images/bishopblock.jpg" class="d-block w-100" alt="Image 2">
    </div>

    <div class="carousel-item">
      <img src="images/evoting.jpg" class="d-block w-100" alt="Image 3">
    </div>

    <div class="carousel-item">
      <img src="images/commited studennts.jpg" class="d-block w-100" alt="Image 4">
    </div>

    <div class="carousel-item">
      <img src="images/sports.jpg" class="d-block w-100" alt="Image 5">
    </div>

    <div class="carousel-item">
      <img src="images/students.jpg" class="d-block w-100" alt="Image 6">
    </div>

  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
